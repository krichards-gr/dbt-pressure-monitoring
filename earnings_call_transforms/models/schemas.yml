version: 2


models:
  - name: stg_corporate_reference
    config:
      tags: ["earnings_calls", "pressure_monitoring", "benchmarking_socials"]
    description: "Staging model for corporate reference information. Basic cleanup, type enforcement, and deduplication. Pulled from external table linked to Google Sheet: https://docs.google.com/spreadsheets/d/1Ct9Mw17bRTl-fRIixbMCWsKkhrMlP3LVKADJag5zS8o/edit?gid=95784411#gid=95784411"
    
    columns:

      - name: assignments
        description: '{{ doc("assignments") }}'

      - name: corporation
        description: '{{ doc("corporation") }}'
        tests:
          - unique

      - name: sector
        description: '{{ doc("sector") }}'
      
      - name: linkedin_url
        description: '{{ doc("profile_linkedin_url") }}'

      - name: instagram_url
        description: '{{ doc("instagram_url") }}'

      - name: newsroom_url
        description: '{{ doc("newsroom_url") }}'

      - name: x_url
        description: '{{ doc("x_url") }}'

      - name: cik
        description: '{{ doc("cik") }}'

      - name: peer_of
        description: '{{ doc("peer_of") }}'

      - name: rank
        description: '{{ doc("company_rank") }}'

      - name: f100
        description: '{{ doc("f100") }}'

      - name: f500
        description: '{{ doc("f500") }}'

      - name: parent
        description: '{{ doc("parent_company") }}'

      - name: symbol
        description: '{{ doc("symbol_or_ticker") }}'

      - name: product
        description: '{{ doc("product") }}'


  - name: stg_earnings_call_metadata
    config:
      tags: ["earnings_calls", "pressure_monitoring"]
    description: "Staging model for earnings call metadata, basic cleanup, type enforcement, and deduplication"
    
    columns:

      - name: transcript_id
        description: '{{ doc("earnings_call_transcript_id") }}'
        tests:
          - unique
          - not_null

      - name: symbol
        description: '{{ doc("symbol_or_ticker") }}'
        tests:
         - not_null

      - name: report_date
        description: "Date on which the call occured"
        tests:
         - not_null

      - name: fiscal_year
        description: '{{ doc("fiscal_year") }}'

      - name: fiscal_quarter
        description: '{{ doc("fiscal_quarter") }}'


  - name: stg_earnings_call_content
    config:
      tags: ["earnings_calls", "pressure_monitoring"]
    description: "Staging model for earnings call content, basic cleanup, type enforcement, and deduplication"
    columns:
      - name: transcript_id
        description: '{{ doc("earnings_call_transcript_id") }}'
        tests:
          - not_null

      - name: paragraph_number
        description: '{{ doc("earnings_call_paragraph_number") }}'
        tests:
            - not_null

      - name: speaker
        description: '{{ doc("earnings_call_speaker") }}'
        tests:
            - not_null

      - name: content
        description: '{{ doc("earnings_call_content") }}'
        tests:
            - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            tags: ["earnings_calls", "pressure_monitoring"]
            severity: warn
          arguments:
            combination_of_columns:
              - transcript_id
              - paragraph_number

  - name: int_earnings_call_enrichments
    config:
      tags: ["earnings_calls", "pressure_monitoring"]
    description: "Intermediate model for earnings call enrichments (currently speaker_type and segment_type labels), with deduplication"
    columns:

      - name: transcript_id
        description: '{{ doc("earnings_call_transcript_id") }}'

      - name: paragraph_number
        description: '{{ doc("earnings_call_paragraph_number") }}'

      - name: speaker_type
        description: '{{ doc("earnings_call_speaker_role") }}'

      - name: segment_type
        description: '{{ doc("earnings_call_segment_type") }}'
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - transcript_id
              - paragraph_number

  - name: int_dashboard_earnings_calls
    config:
      tags: ["earnings_calls", "pressure_monitoring"]
    description: "Consolidated (non-tidy) model for serving in analytics dashboard for analyst access/export"
    
    columns:
      
      - name: paragraph_id
        description: '{{ doc("earnings_call_paragraph_id") }}'

      - name: symbol
        description: '{{ doc("symbol_or_ticker") }}'

      - name: corporation
        description: '{{ doc("corporation") }}'

      - name: sector
        description: '{{ doc("sector") }}'

      - name: transcript_id
        description: '{{ doc("earnings_call_transcript_id") }}'

      - name: report_date
        description: "Date on which the call occured"

      - name: fiscal_year
        description: '{{ doc("fiscal_year") }}'

      - name: fiscal_quarter
        description: '{{ doc("fiscal_quarter") }}'

      - name: paragraph_number
        description: '{{ doc("earnings_call_paragraph_number") }}'
        tests:
            - not_null

      - name: speaker
        description: '{{ doc("earnings_call_speaker") }}'
        tests:
            - not_null

      - name: speaker_type
        description: '{{ doc("earnings_call_speaker_role") }}'

      - name: segment_type
        description: '{{ doc("earnings_call_segment_type") }}'

      - name: content
        description: '{{ doc("earnings_call_content") }}'
        tests:
            - not_null


  - name: mart_dashboard_earnings_calls
    config:
      tags: ["earnings_calls", "pressure_monitoring"]
    description: "Final model, fully-enriched earnings call transcript data, ready to serve"

    columns:
      
      - name: paragraph_id
        description: '{{ doc("earnings_call_paragraph_id") }}'

      - name: symbol
        description: '{{ doc("symbol_or_ticker") }}'

      - name: corporation
        description: '{{ doc("corporation") }}'

      - name: sector
        description: '{{ doc("sector") }}'

      - name: transcript_id
        description: '{{ doc("earnings_call_transcript_id") }}'

      - name: report_date
        description: "Date on which the call occured"

      - name: fiscal_year
        description: '{{ doc("fiscal_year") }}'

      - name: fiscal_quarter
        description: '{{ doc("fiscal_quarter") }}'

      - name: paragraph_number
        description: '{{ doc("earnings_call_paragraph_number") }}'
        tests:
            - not_null

      - name: speaker
        description: '{{ doc("earnings_call_speaker") }}'
        tests:
            - not_null

      - name: speaker_type
        description: '{{ doc("earnings_call_speaker_role") }}'

      - name: segment_type
        description: '{{ doc("earnings_call_segment_type") }}'

      - name: content
        description: '{{ doc("earnings_call_content") }}'
        tests:
            - not_null
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - transcript_id
              - paragraph_number



  - name: stg_ceo_reference
    config:
      tags: "benchmarking_socials"
    description: "Staging model for CEO lookup information basic cleanup, type enforcement, and deduplication"
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: error
          arguments:
            combination_of_columns:
              - corporation
              - executive_name

  - name: stg_issue_term_reference
    config:
      tags: "benchmarking_socials"
    description: "Staging model for basic issue term information basic cleanup, type enforcement, and deduplication"
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: warn
          arguments:
            combination_of_columns:
              - category
              - key_terms

  - name: stg_instagram_posts
    description: "Staging model for instagram data, basic cleanup, type enforcement, and deduplication"
    columns:
      - name: url
        tests:
          - unique
      - name: discovery_input
        tests:
          - not_null

  - name: stg_linkedin_posts
    description: "Staging model for instagram data, basic cleanup, type enforcement, and deduplication"
    columns:
      - name: url
        tests:
          - unique
      - name: discovery_input
        tests:
          - not_null

  - name: stg_x_posts
    description: "Staging model for instagram data, basic cleanup, type enforcement, and deduplication"
    columns:
      - name: url
        tests:
          - unique
      - name: discovery_input
        tests:
          - not_null




  - name: stg_tagged_records
    config:
      tags: ["benchmarking_socials", "benchmarking_other"]
    description: "Finalized and in-process records from our official corporate engagement database. Basic deduplication on primary key"
    columns:
      - name: retool_primary_key
        tests:
          - unique
          - not_null

  - name: int_tagged_records
    config:
      tags: ["benchmarking_socials", "benchmarking_other"]
    description: "Finalized records from our official corporate engagement database. Basic deduplication on primary key"
    columns:
      - name: retool_primary_key
        tests:
          - unique
          - not_null



  - name: stg_story_data
    config:
      tags: ["pressure_monitoring"]
    description: "Staging model for story data from Zignal"

    columns:
      - name: story_id
        description: '{{ doc("story_id") }}'
        tests:
          - unique
          - not_null

      - name: first_seen_date
        description: '{{ doc("first_seen_date") }}'
        tests:
          - not_null

      - name: category
        description: '{{ doc("category") }}'
        tests:
          - not_null


  - name: int_daily_story_data
    config:
      tags: ["pressure_monitoring"]
    description: "Intermediate model for story data from Zignal, calculates count of stories per issue per day"

    columns:
      - name: story_count
        description: '{{ doc("story_count") }}'
        tests:
          - not_null

      - name: publish_date
        description: '{{ doc("first_seen_date") }}'
        tests:
          - not_null

      - name: category
        description: '{{ doc("category") }}'
        tests:
          - not_null


  - name: int_daily_unified_monitoring
    config:
      tags: ["unified_monitoring"]
    description: "Intermediate model that combines daily Zignal story count data with daily engagement count data, by category"

    columns:
      - name: story_count
        description: '{{ doc("story_count") }}'
        tests:
          - not_null

      - name: date
        description: '{{ doc("first_seen_date") }}'
        tests:
          - not_null

      - name: category
        description: '{{ doc("category") }}'
        tests:
          - not_null

      - name: engagement_count
        description: '{{ doc("engagement_count") }}'
        tests:
          - not_null


  - name: mart_daily_unified_monitoring
    config:
      tags: ["unified_monitoring"]
    description: "Mart model supporting self-service combined daily Zignal story count data with daily engagement count data, by category"

    columns:
      - name: story_count
        description: '{{ doc("story_count") }}'
        tests:
          - not_null

      - name: date
        description: '{{ doc("first_seen_date") }}'
        tests:
          - not_null

      - name: category
        description: '{{ doc("category") }}'
        tests:
          - not_null

      - name: engagement_count
        description: '{{ doc("engagement_count") }}'
        tests:
          - not_null