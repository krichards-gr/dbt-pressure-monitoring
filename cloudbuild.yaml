substitutions:
  _REGION: us-east1
  _PROJECT: sri-benchmarking-databases
  _REPO: dbt
  _JOB_NAME: dbt-earnings-call-transforms
  _SERVICE_ACCOUNT: dbt-runner@sri-benchmarking-databases.iam.gserviceaccount.com

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_JOB_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_JOB_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_JOB_NAME}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_JOB_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --service-account=${_SERVICE_ACCOUNT}
      - --memory=2Gi
      - --cpu=1
      - --task-timeout=3600s
      - --max-retries=1

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_JOB_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_JOB_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
